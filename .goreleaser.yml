version: 2

project_name: zlib

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: zlib
    main: ./cmd/zlib
    binary: zlib
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/heartleo/zlib.Version={{.Version}} -X github.com/heartleo/zlib.Commit={{.Commit}} -X github.com/heartleo/zlib.Date={{.Date}}

archives:
  - id: zlib
    ids:
      - zlib
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}

checksum:
  name_template: checksums.txt

brews:
  - name: zlib
    ids:
      - zlib
    repository:
      owner: heartleo
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/heartleo/zlib"
    description: "A CLI for Z-Library"
    license: "MIT"
    install: |
      bin.install "zlib"
    test: |
      system "#{bin}/zlib", "--version"

winget:
  - name: zlib
    package_identifier: heartleo.zlib
    publisher: heartleo
    publisher_url: "https://github.com/heartleo"
    homepage: "https://github.com/heartleo/zlib"
    short_description: "A CLI for Z-Library"
    license: MIT
    tags:
      - z-library
      - ebook
      - terminal
      - cli
    repository:
      owner: heartleo
      name: winget-pkgs
      token: "{{ .Env.WINGET_GITHUB_TOKEN }}"
      pull_request:
        enabled: true
        base:
          owner: microsoft
          name: winget-pkgs
          branch: master

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
      - '^refactor:'
      - '^style:'
      - '^Merge '

release:
  draft: true
  replace_existing_draft: true

